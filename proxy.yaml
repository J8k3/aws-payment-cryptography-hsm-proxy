listen:
  host: 0.0.0.0
  port: 1500
  # TLS — required for production. Omit for local development only.
  #
  # One-way TLS:
  #   tls:
  #     cert_file: /etc/apc-proxy/server.crt
  #     key_file:  /etc/apc-proxy/server.key
  #
  # Mutual TLS (require client cert):
  #   tls:
  #     cert_file: /etc/apc-proxy/server.crt
  #     key_file:  /etc/apc-proxy/server.key
  #     ca_file:   /etc/apc-proxy/client-ca.crt
  #
  # FIPS: swap the `ring` feature for `aws-lc-rs` in Cargo.toml and recompile.
  #        The crypto provider is selected at compile time — no other code changes needed.

# Protocol variant: thales_payshield | futurex_excrypt
vendor: thales_payshield

aws:
  region: us-east-1
  # Named credential profile. Omit to use default chain: IAM role → env → instance metadata.
  # profile: apc-proxy

# Discovery / passthrough mode.
#
# When enabled, commands with no registered plugin handler are forwarded to the
# real HSM instead of returning error 68. The command code and non-sensitive
# parameters are logged to stdout (key blocks and PIN blocks are redacted).
#
# Use this mode to observe what commands your application sends before writing
# plugin handlers for them. All implemented commands are still translated to APC —
# only unhandled ones pass through.
#
# discover:
#   enabled: false
#   hsm_host: 192.168.1.10
#   hsm_port: 1500
#   log_file: discovery.jsonl   # structured NDJSON — one record per unique command code
#                               # feed directly to your AI coding client to generate handler stubs

# ──────────────────────────────────────────────────────────────────────────────
# Integration test key mappings
#
# All test keys live in us-east-1 account 030716882260.
# Keys marked "[known material]" were imported via KEY_CRYPTOGRAM (RSA-OAEP-SHA256)
# with test material from scripts/import_test_keys.py — the same raw bytes can be
# used in CyberChef for Level 2 cross-validation.
#
# Key material reference (non-production use only):
#   LTEST_P0SRC_0001  P0 ZPK src   0123456789ABCDEF0123456789ABCDEF  KCV D5D44F
#   LTEST_P0DST_0001  P0 ZPK dst   FEDCBA9876543210FEDCBA9876543210  KCV A68CDC
#   LTEST_V1PVK_0001  V1 IBM PVK   112233445566778811223344556677AA  KCV 85A8D3
#   LTEST_V2PVK_*     V2 Visa PVK  AABBCCDDEEFF00011122334455667788  KCV 664CDA
#   LTEST_B0BDK_*     B0 BDK       0123456789ABCDEFFEDCBA9876543210  KCV 08D7B4
#   LTEST_E0IMK_0001  E0 AES-256   APC-generated (no known material) KCV 9AA39D
#
# Cleanup: run `python scripts/delete_test_keys.py` to schedule all listed keys
# for deletion after testing.
# ──────────────────────────────────────────────────────────────────────────────
key_mappings:
  # ── Futurex TPIN key labels (Excrypt AX/BT parameter values) ─────────────────
  ZPK_INBOUND:  "arn:aws:payment-cryptography:us-east-1:030716882260:key/njodcvi5plbzmhkg"  # P0SRC [known]
  ZPK_OUTBOUND: "arn:aws:payment-cryptography:us-east-1:030716882260:key/xaude4iot7jabf5m"  # P0DST [known]

  # ── 16-char labels (parse_legacy_key plain / parse_legacy_key 16H) ──────────

  # Existing live test keys (MA/MC and HE/HG integration tests)
  LIVETEST_MAC_001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/igkljfe7u77hg37c"  # M1 TDES
  LIVETEST_DEK_001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/hygvlh26clxy4jx3"  # D0 TDES

  # MAC keys
  LTEST_M1_MAC_001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/igkljfe7u77hg37c"  # M1 ISO9797-Alg1 TDES
  LTEST_M3_MAC_001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/tcpuujxalggq75pc"  # M3 ISO9797-Alg3 TDES
  LTEST_M6_MAC_001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/xoyhrt3k7yi2tjgm"  # M6 CMAC AES-128

  # HMAC key
  LTEST_HMAC_00001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/lyo3yae4a7j22jsx"  # M7 HMAC AES-128

  # Card verification key
  LTEST_CVK_000001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/i6fwfb5atwo4rcbe"  # C0 CVK TDES

  # PIN keys [known material] — used in DA/DC/CA DA
  LTEST_P0SRC_0001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/njodcvi5plbzmhkg"  # P0 ZPK src [known]
  LTEST_P0DST_0001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/xaude4iot7jabf5m"  # P0 ZPK dst [known]
  LTEST_V1PVK_0001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/fh7ebt6ieyiyw57e"  # V1 IBM PVK [known]

  # EMV ARQC master key (APC-generated; no known material — Level 1 test only)
  LTEST_E0IMK_0001: "arn:aws:payment-cryptography:us-east-1:030716882260:key/iiv65vnfxrbvofbv"  # E0 AES-256

  # ── 32-char labels (parse_key_32 / parse_bdk plain / CA 32H key field) ──────

  # Visa PVV PVK [known material] — 32H for parse_key_32 (DC/EC command)
  "LTEST_V2PVK_0001LTEST_V2PVK_0001": "arn:aws:payment-cryptography:us-east-1:030716882260:key/s5oan6j3kbvb735q"

  # DUKPT BDK [known material] — 32H for parse_bdk (GW command)
  "LTEST_B0BDK_0001LTEST_B0BDK_0001": "arn:aws:payment-cryptography:us-east-1:030716882260:key/nmn2jogdb57p4dbx"

  # M1/M3 keys addressed as 32H (C2/C4 command — key is always 32H, no parse_legacy_key prefix)
  "LTEST_M1_MAC_001LTEST_M1_MAC_001": "arn:aws:payment-cryptography:us-east-1:030716882260:key/igkljfe7u77hg37c"
  "LTEST_M3_MAC_001LTEST_M3_MAC_001": "arn:aws:payment-cryptography:us-east-1:030716882260:key/tcpuujxalggq75pc"

  # P0 ZPK keys as 32H — CA/CC/BQ use bytes 2-34 and 34-66 as key IDs (always 32H)
